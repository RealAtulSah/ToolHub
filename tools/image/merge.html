<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Merge Images Online | Stitch Photos Side-by-Side - ToolHub Pro</title>
  <meta name="title" content="Merge Images Online | Stitch Photos Side-by-Side - ToolHub Pro">
  <meta name="description" content="Merge multiple images vertically or horizontally side-by-side online. Drag and drop file combiner. 100% private.">
  <link rel="canonical" href="https://toolhub.pro/tools/image/merge.html">

  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <script>window.toolId = 'merge';</script>
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <header class="global-header" id="global-header"></header>

    <main class="main-content">
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Image Tools</span> &gt; <span>Merge Images</span>
        </div>
        <h1 class="section-title">Merge Images</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Combine multiple photos side-by-side (horizontally) or stacked (vertically) into a single file.</p>
      </div>

      <!-- Multi Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"></div>
        <h3 class="upload-title">Drag & drop images to combine</h3>
        <p class="upload-subtitle">Upload 2 or more files (Max 15MB each)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="multi-file-input" accept="image/*" multiple style="display: none;">
      </div>

      <!-- Workspace -->
      <div class="tool-workspace" id="workspace" style="display: none;">
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Merged Output Preview</h3>
          <div style="display: flex; align-items: center; justify-content: center; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; height: 350px; overflow: hidden;">
            <img id="preview-image" style="max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 4px;" alt="Merged preview">
          </div>
        </div>

        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 24px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Merge Direction</h3>
          
          <div>
            <label for="merge-direction" style="display: block; margin-bottom: 8px; font-weight: 500;">Orientation</label>
            <select id="merge-direction" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-md); color: var(--text-primary); cursor: pointer;">
              <option value="horizontal">Horizontal (Side-by-Side)</option>
              <option value="vertical">Vertical (Stacked)</option>
            </select>
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
            <button class="btn btn-primary" id="download-btn">Download Merged Image</button>
            <button class="btn btn-secondary" id="reset-btn">Combine Different Files</button>
          </div>
        </div>
      </div>

      <footer id="global-footer"></footer>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="compositors.js"></script>
</body>
</html>
