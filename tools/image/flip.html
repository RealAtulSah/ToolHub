<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' blob: data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Flip Image Online | Mirror Photos Horizontally & Vertically - ToolHub Pro</title>
  <meta name="title" content="Flip Image Online | Mirror Photos Horizontally & Vertically - ToolHub Pro">
  <meta name="description" content="Flip and mirror your photos horizontally or vertically in your browser. Fast and completely secure processing.">
  <link rel="canonical" href="https://toolhub.pro/tools/image/flip.html">

  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <header class="global-header" id="global-header"></header>

    <main class="main-content">
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Image Tools</span> &gt; <span>Flip Image</span>
        </div>
        <h1 class="section-title">Flip Image</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Flip and mirror images vertically or horizontally instantly.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon">↕️</div>
        <h3 class="upload-title">Drag & drop your image here</h3>
        <p class="upload-subtitle">Supports JPG, PNG, WEBP (Max 20MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
      </div>

      <!-- Workspace -->
      <div class="tool-workspace" id="workspace" style="display: none;">
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Mirrored Preview</h3>
          <div style="display: flex; align-items: center; justify-content: center; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; height: 350px; overflow: hidden;">
            <img id="preview-image" style="max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 4px;" alt="Mirrored output preview">
          </div>
        </div>

        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 24px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Flip Settings</h3>
          
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <label style="display: inline-flex; align-items: center; gap: 12px; cursor: pointer; user-select: none;">
              <input type="checkbox" id="flip-h" style="accent-color: var(--accent); width: 18px; height: 18px;">
              <span style="font-size: 1rem; color: var(--text-primary);">Flip Horizontally (Left-Right)</span>
            </label>
            <label style="display: inline-flex; align-items: center; gap: 12px; cursor: pointer; user-select: none;">
              <input type="checkbox" id="flip-v" style="accent-color: var(--accent); width: 18px; height: 18px;">
              <span style="font-size: 1rem; color: var(--text-primary);">Flip Vertically (Upside-Down)</span>
            </label>
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
            <button class="btn btn-primary" id="download-btn">Download Image</button>
            <button class="btn btn-secondary" id="reset-btn">Flip Another Image</button>
          </div>
        </div>
      </div>

      <footer id="global-footer"></footer>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="geometry.js"></script>
</body>
</html>
