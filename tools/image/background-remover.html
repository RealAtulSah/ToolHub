<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Background Remover | Chroma Key Solid Colors online - ToolHub Pro</title>
  <meta name="title" content="Background Remover | Chroma Key Solid Colors online - ToolHub Pro">
  <meta name="description" content="Remove image background colors automatically online. Select colors with the dropper tool and adjust tolerance. Private client-side eraser.">
  <link rel="canonical" href="https://toolhub.pro/tools/image/background-remover.html">

  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <script>window.toolId = 'background-remover';</script>
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <header class="global-header" id="global-header"></header>

    <main class="main-content">
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Image Tools</span> &gt; <span>Background Remover</span>
        </div>
        <h1 class="section-title">Background Remover</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Erase solid color backdrops instantly using chroma-keying pixel operations.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"></div>
        <h3 class="upload-title">Drag & drop your image here</h3>
        <p class="upload-subtitle">Supports JPG, PNG, WEBP (Max 15MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
      </div>

      <!-- Workspace -->
      <div class="tool-workspace" id="workspace" style="display: none;">
        <!-- Left: Chroma Canvas -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%; align-items: center;">
          <h3 style="align-self: flex-start; font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Remove Canvas (Click Color to Remove)</h3>
          
          <div style="background: repeating-conic-gradient(#334155 0% 25%, #1e293b 0% 50%) 50% / 20px 20px; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 8px; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;">
            <canvas id="preview-canvas-bg" style="max-width: 100%; cursor: crosshair; display: block; border-radius: 4px;"></canvas>
          </div>
        </div>

        <!-- Right: Chroma Settings -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 24px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Chroma Key Config</h3>
          
          <div>
            <label for="chroma-color" style="display: block; margin-bottom: 8px; font-weight: 500;">Target Color</label>
            <input type="color" id="chroma-color" value="#ffffff" style="width: 100%; height: 40px; background: none; border: 1px solid var(--border-color); border-radius: var(--radius-sm); cursor: pointer; padding: 2px;">
          </div>

          <div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 500;">
              <label for="chroma-tolerance">Erase Tolerance</label>
              <span id="tolerance-val">30</span>
            </div>
            <input type="range" id="chroma-tolerance" min="1" max="150" value="30" style="width: 100%; accent-color: var(--accent);">
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
            <button class="btn btn-primary" id="download-btn">Download transparent PNG</button>
            <button class="btn btn-secondary" id="reset-btn">Upload Another Image</button>
          </div>
        </div>
      </div>

      <footer id="global-footer"></footer>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="compositors.js"></script>
</body>
</html>
