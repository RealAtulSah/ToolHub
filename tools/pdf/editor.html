<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Tags -->
  <title>PDF Editor Online | Edit PDF Files - ToolHub Pro</title>
  <meta name="title" content="PDF Editor Online | Edit PDF Files - ToolHub Pro">
  <meta name="description" content="Add text, drawings, freehand notes, and custom lines to your PDF files directly. 100% private client-side processing.">
  <link rel="canonical" href="https://toolhub.pro/tools/pdf/editor.html">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <!-- Collapsible Sidebar -->
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Header Navigation -->
    <header class="global-header" id="global-header"></header>

    <!-- Main Content Panel -->
    <main class="main-content">
      
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>PDF Tools</span> &gt; <span>PDF Editor</span>
        </div>
        <h1 class="section-title">PDF Editor</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Draw shapes, write custom text annotations, and modify your PDF file pages directly. Private and local.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent); margin-bottom: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></div>
        <h3 class="upload-title">Drag & drop your PDF here</h3>
        <p class="upload-subtitle">Supports PDF files (Max 50MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="application/pdf" style="display: none;">
      </div>

      <!-- Processing Workspace (Hidden Initially) -->
      <div class="tool-workspace" id="workspace" style="display: none; grid-template-columns: 1.5fr 1fr; gap: 24px;">
        <!-- Left Column: Document Canvas Page + Overlay Draw Canvas -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; width: 100%; min-height: 400px; overflow: auto; background: var(--bg-tertiary); position: relative;">
          <div style="position: relative; display: inline-block;">
            <canvas id="editor-canvas" style="border: 1px solid var(--border-color); background: white; max-width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.25); display: block;"></canvas>
            <canvas id="drawing-canvas-overlay" style="position: absolute; top:0; left:0; width: 100%; height: 100%; cursor: crosshair;"></canvas>
          </div>
        </div>

        <!-- Right Column: Editor Controls -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600; margin: 0;">Editor Controls</h3>

          <!-- Details -->
          <div style="display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
            <div><strong>File:</strong> <span id="filename-label" style="color: var(--text-secondary);"></span></div>
            <div><strong>Page Info:</strong> <span id="editor-page-stat" style="color: var(--text-secondary);"></span></div>
          </div>

          <!-- Tool Modes -->
          <div>
            <label for="tool-mode-select" style="display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 500;">Active Tool</label>
            <select id="tool-mode-select" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); padding: 10px; border-radius: var(--radius-md); color: var(--text-primary); cursor: pointer;">
              <option value="draw">️ Freehand Draw</option>
              <option value="text">Add Text Annotations</option>
            </select>
          </div>

          <!-- Color selection -->
          <div>
            <label for="color-picker-input" style="display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 500;">Drawing Color</label>
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="color" id="color-picker-input" value="#ff0000" style="background: none; border: none; cursor: pointer; width: 44px; height: 44px; padding: 0;">
              <span style="font-size: 0.85rem; color: var(--text-secondary);">Choose drawing or text color</span>
            </div>
          </div>

          <!-- Navigation buttons -->
          <div style="display: flex; justify-content: space-between; gap: 10px;">
            <button class="btn btn-secondary btn-sm" id="editor-prev-btn" style="flex: 1;">&larr; Prev Page</button>
            <button class="btn btn-secondary btn-sm" id="editor-next-btn" style="flex: 1;">Next Page &rarr;</button>
          </div>

          <!-- Action Buttons -->
          <div style="display: flex; flex-direction: column; gap: 10px; margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <button class="btn btn-primary" id="save-editor-btn">
              Apply Edits & Save
            </button>
            <button class="btn btn-secondary" id="reset-btn">
              Choose Another File
            </button>
          </div>
        </div>
      </div>

      <!-- Dynamic Footer -->
      <footer id="global-footer"></footer>

    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="pdf-editors.js"></script>
</body>
</html>
