<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Saturation Adjuster | Make Image Colors Vibrant - ToolHub Pro</title>
  <meta name="title" content="Saturation Adjuster | Make Image Colors Vibrant - ToolHub Pro">
  <meta name="description" content="Adjust image saturation online to make colors vibrant or convert to black and white. Fast and completely secure browser editor.">
  <link rel="canonical" href="https://toolhub.pro/tools/image/saturation.html">

  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <script>window.toolId = 'saturation';</script>
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <header class="global-header" id="global-header"></header>

    <main class="main-content">
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Image Tools</span> &gt; <span>Saturation Adjuster</span>
        </div>
        <h1 class="section-title">Saturation Adjuster</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Adjust intensity levels of image colors, or desaturate completely to black and white.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"></div>
        <h3 class="upload-title">Drag & drop your image here</h3>
        <p class="upload-subtitle">Supports JPG, PNG, WEBP (Max 20MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
      </div>

      <!-- Workspace -->
      <div class="tool-workspace" id="workspace" style="display: none;">
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Color Preview</h3>
          <div style="display: flex; align-items: center; justify-content: center; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; height: 350px; overflow: hidden;">
            <img id="preview-image" style="max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 4px;" alt="Saturation preview">
          </div>
        </div>

        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 24px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Saturation Setting</h3>
          
          <div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 500;">
              <label for="saturation-slider">Saturation</label>
              <span id="saturation-slider-val">100%</span>
            </div>
            <input type="range" id="saturation-slider" min="0" max="200" value="100" style="width: 100%; accent-color: var(--accent);">
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
            <button class="btn btn-primary" id="download-btn">Download Image</button>
            <button class="btn btn-secondary" id="reset-btn">Adjust Another Image</button>
          </div>
        </div>
      </div>

      <footer id="global-footer"></footer>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="filters.js"></script>
</body>
</html>
