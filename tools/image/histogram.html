<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Image Histogram Analyzer | RGB Color Balance Chart - ToolHub Pro</title>
  <meta name="title" content="Image Histogram Analyzer | RGB Color Balance Chart - ToolHub Pro">
  <meta name="description" content="Analyze the RGB and luminosity channel levels of photos. View interactive, detailed color histogram chart client-side.">
  <link rel="canonical" href="https://toolhub.pro/tools/image/histogram.html">

  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <script>window.toolId = 'histogram';</script>
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <header class="global-header" id="global-header"></header>

    <main class="main-content">
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Image Tools</span> &gt; <span>Image Histogram</span>
        </div>
        <h1 class="section-title">Image Histogram</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Visualize the RGB color channel distributions of your photographs locally.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"></div>
        <h3 class="upload-title">Drag & drop your image here</h3>
        <p class="upload-subtitle">Supports JPG, PNG, WEBP (Max 20MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
      </div>

      <!-- Workspace -->
      <div class="tool-workspace" id="workspace" style="display: none;">
        <!-- Left: Image Preview -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Original Image</h3>
          <div style="display: flex; align-items: center; justify-content: center; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; height: 320px; overflow: hidden;">
            <img id="preview-image" style="max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 4px;" alt="Source preview">
          </div>
        </div>

        <!-- Right: Histogram Graph -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">RGB Channels Distribution</h3>
          
          <div id="histogram-container" style="background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; height: 220px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
            <!-- Dynamic SVG loaded by filters.js -->
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
            <div style="display: flex; gap: 12px; justify-content: center; font-size: 0.8rem; font-weight: 600;">
              <span style="color: rgb(239, 68, 68);">■ Red</span>
              <span style="color: rgb(16, 185, 129);">■ Green</span>
              <span style="color: rgb(59, 130, 246);">■ Blue</span>
            </div>
            <button class="btn btn-secondary" id="reset-btn">Analyze Another Image</button>
          </div>
        </div>
      </div>

      <footer id="global-footer"></footer>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="filters.js"></script>
</body>
</html>
