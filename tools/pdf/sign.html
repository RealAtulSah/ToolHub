<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' blob: data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Tags -->
  <title>Add PDF Signature Online | E-Sign PDF - ToolHub Pro</title>
  <meta name="title" content="Add PDF Signature Online | E-Sign PDF - ToolHub Pro">
  <meta name="description" content="Draw or upload custom signatures and place them anywhere on PDF pages. 100% private in-browser signing.">
  <link rel="canonical" href="https://toolhub.pro/tools/pdf/sign.html">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <!-- Collapsible Sidebar -->
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Header Navigation -->
    <header class="global-header" id="global-header"></header>

    <!-- Main Content Panel -->
    <main class="main-content">
      
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>PDF Tools</span> &gt; <span>Add PDF Signature</span>
        </div>
        <h1 class="section-title">Add PDF Signature</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Draw a custom signature and place it anywhere on your PDF document pages. Safe and secure.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent); margin-bottom: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></div>
        <h3 class="upload-title">Drag & drop your PDF here</h3>
        <p class="upload-subtitle">Supports PDF files (Max 50MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="application/pdf" style="display: none;">
      </div>

      <!-- Processing Workspace (Hidden Initially) -->
      <div class="tool-workspace" id="workspace" style="display: none; grid-template-columns: 1.5fr 1fr; gap: 24px;">
        <!-- Left Column: Document Previews -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600; margin: 0;">Click Preview Page to Position Signature</h3>
            
            <select id="sign-page-select" style="background: var(--bg-tertiary); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: var(--radius-md); color: var(--text-primary); cursor: pointer;">
              <!-- Pages populated dynamically -->
            </select>
          </div>
          
          <div id="pages-preview-grid">
            <!-- Rendered single page canvas with click listener -->
          </div>
        </div>

        <!-- Right Column: Control Options -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600; margin: 0;">Signature Creator</h3>

          <!-- Details -->
          <div style="display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem;">
            <div><strong>File:</strong> <span id="filename-label" style="color: var(--text-secondary);"></span></div>
            <div><strong>Pages:</strong> <span id="pages-label" style="color: var(--text-secondary);"></span></div>
          </div>

          <!-- Drawing Pad Canvas -->
          <div style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; height: 160px; position: relative;">
            <canvas id="signature-pad" width="300" height="160" style="width: 100%; height: 100%; cursor: crosshair; background: #fff;"></canvas>
          </div>

          <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary btn-sm" id="clear-pad-btn" style="flex: 1;">Clear Pad</button>
            <button class="btn btn-secondary btn-sm" id="save-pad-btn" style="flex: 1; border-color: var(--accent); color: var(--accent);">Save Draw</button>
          </div>

          <!-- Action Buttons -->
          <div style="display: flex; flex-direction: column; gap: 10px; margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <button class="btn btn-primary" id="apply-signature-btn">
              Apply & Save PDF
            </button>
            <button class="btn btn-secondary" id="reset-btn">
              Choose Another File
            </button>
          </div>
        </div>
      </div>

      <!-- Dynamic Footer -->
      <footer id="global-footer"></footer>

    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="pdf-security.js"></script>
</body>
</html>
