<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>QR Code Reader | Scan & Decode QR Codes - ToolHub Pro</title>
  <meta name="title" content="QR Code Reader | Scan & Decode QR Codes - ToolHub Pro">
  <meta name="description" content="Scan and decode QR codes from uploaded images online. Fast, secure, and completely private browser-based reader.">
  <link rel="canonical" href="https://toolhub.pro/tools/image/qr-reader.html">

  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
  <script>window.toolId = 'qr-reader';</script>
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <header class="global-header" id="global-header"></header>

    <main class="main-content">
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Image Tools</span> &gt; <span>QR Code Reader</span>
        </div>
        <h1 class="section-title">QR Code Reader</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Upload a QR Code image to scan and extract encoded text or links locally.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"></div>
        <h3 class="upload-title">Drag & drop your QR Code image here</h3>
        <p class="upload-subtitle">Supports PNG, JPG, WEBP (Max 10MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
      </div>

      <!-- Workspace -->
      <div class="tool-workspace" id="workspace" style="display: none;">
        <!-- Left: Image Preview -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Uploaded QR Code</h3>
          <div style="display: flex; align-items: center; justify-content: center; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; height: 320px; overflow: hidden;">
            <img id="preview-image" style="max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 4px;" alt="Source preview">
          </div>
        </div>

        <!-- Right: Text Decoded output -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Scanned Output</h3>
          
          <div style="display: flex; flex-direction: column; gap: 8px; flex-grow: 1;">
            <label for="qr-output" style="font-weight: 500; font-size: 0.9rem;">Decoded Payload Content</label>
            <textarea id="qr-output" readonly placeholder="Scanning results will show up here..." style="width: 100%; height: 200px; background: var(--bg-tertiary); border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-sm); color: var(--text-primary); font-family: monospace; font-size: 0.9rem; line-height: 1.5; resize: none;"></textarea>
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="btn btn-primary" id="copy-qr-btn">Copy Output Text</button>
            <button class="btn btn-secondary" id="reset-btn">Scan Another QR Code</button>
          </div>
        </div>
      </div>

      <footer id="global-footer"></footer>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="extractors.js"></script>
</body>
</html>
