<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' blob: data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>PNG to WEBP Converter | Optimize Image Formats - ToolHub Pro</title>
  <meta name="title" content="PNG to WEBP Converter | Optimize Image Formats - ToolHub Pro">
  <meta name="description" content="Convert standard PNG images to highly compressed WEBP format online. Modern format optimization with browser-based speed.">
  <link rel="canonical" href="https://toolhub.pro/tools/image/png-to-webp.html">

  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <header class="global-header" id="global-header"></header>

    <main class="main-content">
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Image Tools</span> &gt; <span>PNG to WEBP Converter</span>
        </div>
        <h1 class="section-title">PNG to WEBP Converter</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Convert PNG images to WEBP. Faster page loading times, 100% private.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"></div>
        <h3 class="upload-title">Drag & drop your PNG image here</h3>
        <p class="upload-subtitle">Supports PNG (Max 20MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="image/png" style="display: none;">
      </div>

      <!-- Workspace -->
      <div class="tool-workspace" id="workspace" style="display: none;">
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Converted Preview (WEBP)</h3>
          <div style="display: flex; align-items: center; justify-content: center; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; height: 350px; overflow: hidden;">
            <img id="preview-image" style="max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 4px;" alt="WEBP output preview">
          </div>
        </div>

        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 24px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Conversion Info</h3>
          <div style="display: flex; flex-direction: column; gap: 12px; background: var(--bg-tertiary); padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
              <span style="color: var(--text-secondary);">Original File Size:</span>
              <span id="orig-size" style="font-weight: 600;">0 KB</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; border-top: 1px solid var(--border-color); padding-top: 12px; margin-top: 4px;">
              <span style="color: var(--text-secondary);">Converted File Size:</span>
              <span id="target-size" style="font-weight: 600; color: var(--accent);">0 KB</span>
            </div>
          </div>
          
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="btn btn-primary" id="download-btn">Download WEBP Image</button>
            <button class="btn btn-secondary" id="reset-btn">Convert Another Image</button>
          </div>
        </div>
      </div>

      <footer id="global-footer"></footer>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="converters.js"></script>
</body>
</html>
