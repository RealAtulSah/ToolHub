<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Tags -->
  <title>Convert PDF to Excel Online | PDF to Spreadsheet - ToolHub Pro</title>
  <meta name="title" content="Convert PDF to Excel Online | PDF to Spreadsheet - ToolHub Pro">
  <meta name="description" content="Extract tabular data from PDF files and download as Excel sheets (.xlsx). 100% private in-browser extraction.">
  <link rel="canonical" href="https://toolhub.pro/tools/pdf/pdf-to-excel.html">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <!-- Collapsible Sidebar -->
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Header Navigation -->
    <header class="global-header" id="global-header"></header>

    <!-- Main Content Panel -->
    <main class="main-content">
      
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>PDF Tools</span> &gt; <span>PDF to Excel</span>
        </div>
        <h1 class="section-title">PDF to Excel Converter</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Extract data tables and structures from PDF files into standard spreadsheets. Completely local.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent); margin-bottom: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></div>
        <h3 class="upload-title">Drag & drop your PDF here</h3>
        <p class="upload-subtitle">Supports PDF files (Max 50MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="application/pdf" style="display: none;">
      </div>

      <!-- Processing Workspace (Hidden Initially) -->
      <div class="tool-workspace" id="workspace" style="display: none; grid-template-columns: 1.5fr 1fr; gap: 24px;">
        <!-- Left Column: Preview Area -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600; margin: 0;">Extracted Document Content</h3>
          
          <textarea id="text-preview" readonly style="
            width: 100%;
            height: 350px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            padding: 16px;
            font-family: monospace;
            font-size: 0.9rem;
            resize: none;
          "></textarea>
        </div>

        <!-- Right Column: Control Options -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 24px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Data Extraction</h3>

          <!-- Details -->
          <div style="display: flex; flex-direction: column; gap: 6px; font-size: 0.9rem; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">
            <div><strong>File Name:</strong> <span id="filename-label" style="color: var(--text-secondary);"></span></div>
            <div><strong>Original Size:</strong> <span id="size-label" style="color: var(--text-secondary);"></span></div>
            <div><strong>Total Pages:</strong> <span id="pages-label" style="color: var(--text-secondary);"></span></div>
          </div>

          <!-- Format selection -->
          <div>
            <label for="data-format" style="display: block; margin-bottom: 8px; font-weight: 500;">Output Format</label>
            <select id="data-format" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-md); color: var(--text-primary); cursor: pointer;">
              <option value="xlsx">Excel Workbook (.xlsx)</option>
              <option value="csv">CSV (Comma Delimited)</option>
              <option value="json">JSON Object Map</option>
            </select>
          </div>

          <!-- Action Buttons -->
          <div style="display: flex; flex-direction: column; gap: 12px; margin-top: auto;">
            <button class="btn btn-primary" id="pdf-to-data-btn">
              Extract & Save Spreadsheet
            </button>
            <button class="btn btn-secondary" id="reset-btn">
              Choose Another File
            </button>
          </div>
        </div>
      </div>

      <!-- Dynamic Footer -->
      <footer id="global-footer"></footer>

    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="pdf-converters.js"></script>
</body>
</html>
