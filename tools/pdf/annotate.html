<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' blob: data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Tags -->
  <title>PDF Annotation Tool Online | Comment on PDF - ToolHub Pro</title>
  <meta name="title" content="PDF Annotation Tool Online | Comment on PDF - ToolHub Pro">
  <meta name="description" content="Add sticky notes, comments, stamps, and feedback pins onto PDF layout locations. 100% private in-browser tool.">
  <link rel="canonical" href="https://toolhub.pro/tools/pdf/annotate.html">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <!-- Collapsible Sidebar -->
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Header Navigation -->
    <header class="global-header" id="global-header"></header>

    <!-- Main Content Panel -->
    <main class="main-content">
      
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>PDF Tools</span> &gt; <span>PDF Annotations</span>
        </div>
        <h1 class="section-title">PDF Annotation Tool</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Place feedback markers on pages and compile comments inside your PDF document. Local and secure.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent); margin-bottom: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></div>
        <h3 class="upload-title">Drag & drop your PDF here</h3>
        <p class="upload-subtitle">Supports PDF files (Max 50MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="application/pdf" style="display: none;">
      </div>

      <!-- Processing Workspace (Hidden Initially) -->
      <div class="tool-workspace" id="workspace" style="display: none; grid-template-columns: 1.5fr 1fr; gap: 24px;">
        <!-- Left Column: PDF canvas page overlay -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; width: 100%; min-height: 400px; overflow: auto; background: var(--bg-tertiary); position: relative;">
          <div style="position: relative; display: inline-block;">
            <canvas id="annotator-canvas" style="border: 1px solid var(--border-color); background: white; max-width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.25); display: block;"></canvas>
            <canvas id="annotator-overlay" style="position: absolute; top:0; left:0; width: 100%; height: 100%; cursor: pointer;"></canvas>
          </div>
        </div>

        <!-- Right Column: Comments list panel -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600; margin: 0;">Sticky Comments</h3>

          <!-- Details -->
          <div style="display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
            <div><strong>File:</strong> <span id="filename-label" style="color: var(--text-secondary);"></span></div>
            <div><strong>Page Info:</strong> <span id="annotator-page-stat" style="color: var(--text-secondary);"></span></div>
          </div>

          <!-- Comments List -->
          <div id="comments-sidebar" style="display: flex; flex-direction: column; gap: 12px; max-height: 200px; overflow-y: auto; padding-right: 4px;">
            <!-- Added comments list -->
          </div>

          <!-- Navigation buttons -->
          <div style="display: flex; justify-content: space-between; gap: 10px;">
            <button class="btn btn-secondary btn-sm" id="annotator-prev-btn" style="flex: 1;">&larr; Prev Page</button>
            <button class="btn btn-secondary btn-sm" id="annotator-next-btn" style="flex: 1;">Next Page &rarr;</button>
          </div>

          <!-- Action Buttons -->
          <div style="display: flex; flex-direction: column; gap: 10px; margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-color);">
            <button class="btn btn-primary" id="save-annotations-btn">
              Burn Comments & Save
            </button>
            <button class="btn btn-secondary" id="reset-btn">
              Choose Another File
            </button>
          </div>
        </div>
      </div>

      <!-- Dynamic Footer -->
      <footer id="global-footer"></footer>

    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="pdf-editors.js"></script>
</body>
</html>
