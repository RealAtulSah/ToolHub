<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Tags -->
  <title>PDF Viewer Online | Read PDF Files - ToolHub Pro</title>
  <meta name="title" content="PDF Viewer Online | Read PDF Files - ToolHub Pro">
  <meta name="description" content="A high-fidelity in-browser PDF reader with zoom, page selection, and search. 100% private and runs local.">
  <link rel="canonical" href="https://toolhub.pro/tools/pdf/viewer.html">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <!-- Collapsible Sidebar -->
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Header Navigation -->
    <header class="global-header" id="global-header"></header>

    <!-- Main Content Panel -->
    <main class="main-content">
      
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>PDF Tools</span> &gt; <span>PDF Viewer</span>
        </div>
        <h1 class="section-title">PDF Viewer</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Open and view PDF documents securely inside your browser. No files leave your device.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent); margin-bottom: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></div>
        <h3 class="upload-title">Drag & drop your PDF here</h3>
        <p class="upload-subtitle">Supports PDF files (Max 100MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="application/pdf" style="display: none;">
      </div>

      <!-- Processing Workspace (Hidden Initially) -->
      <div class="tool-workspace" id="workspace" style="display: none; grid-template-columns: 1.5fr 1fr; gap: 24px;">
        <!-- Left Column: Document Canvas Page -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; width: 100%; min-height: 400px; overflow: auto; background: var(--bg-tertiary);">
          <canvas id="viewer-canvas" style="border: 1px solid var(--border-color); background: white; max-width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.25);"></canvas>
        </div>

        <!-- Right Column: Navigation Controls -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 24px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Reader Controls</h3>

          <!-- Details -->
          <div style="display: flex; flex-direction: column; gap: 6px; font-size: 0.9rem; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">
            <div><strong>File Name:</strong> <span id="filename-label" style="color: var(--text-secondary);"></span></div>
            <div><strong>Original Size:</strong> <span id="size-label" style="color: var(--text-secondary);"></span></div>
            <div><strong>Total Pages:</strong> <span id="pages-label" style="color: var(--text-secondary);"></span></div>
          </div>

          <!-- Page navigation -->
          <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px;">
            <button class="btn btn-secondary" id="prev-page-btn" style="flex: 1;">&larr; Prev Page</button>
            <div style="font-weight: 600; font-size: 0.95rem;">
              <span id="current-page-num">1</span> / <span id="total-pages-count">1</span>
            </div>
            <button class="btn btn-secondary" id="next-page-btn" style="flex: 1;">Next Page &rarr;</button>
          </div>

          <!-- Zoom controls -->
          <div style="display: flex; gap: 12px;">
            <button class="btn btn-secondary" id="zoom-out-btn" style="flex: 1; font-weight: bold;">Zoom -</button>
            <button class="btn btn-secondary" id="zoom-in-btn" style="flex: 1; font-weight: bold;">Zoom +</button>
          </div>

          <!-- Reset Buttons -->
          <div style="display: flex; flex-direction: column; gap: 12px; margin-top: auto;">
            <button class="btn btn-secondary" id="reset-btn">
              Close Viewer
            </button>
          </div>
        </div>
      </div>

      <!-- Dynamic Footer -->
      <footer id="global-footer"></footer>

    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="pdf-editors.js"></script>
</body>
</html>
