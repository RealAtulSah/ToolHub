<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' blob: data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Tags -->
  <title>Convert Markdown to HTML Online | Markdown to HTML - ToolHub Pro</title>
  <meta name="title" content="Convert Markdown to HTML Online | Markdown to HTML - ToolHub Pro">
  <meta name="description" content="Translate standard Markdown syntax to structured HTML paragraphs, lists, and headers online. 100% private in-browser tool.">
  <link rel="canonical" href="https://toolhub.pro/tools/converter/markdown-to-html.html">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <!-- Collapsible Sidebar -->
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Header Navigation -->
    <header class="global-header" id="global-header"></header>

    <!-- Main Content Panel -->
    <main class="main-content">
      
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Converters</span> &gt; <span>Markdown to HTML</span>
        </div>
        <h1 class="section-title">Markdown to HTML Converter</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Compile standard Markdown notation into clean HTML tags. Fast, secure, and offline-ready.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone" style="margin-bottom: 24px;">
        <div class="upload-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent); margin-bottom: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></div>
        <h3 class="upload-title">Drag & drop your Markdown file here</h3>
        <p class="upload-subtitle">Supports markdown (.md) or text files (Max 10MB) or type directly below</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept=".md,text/*" style="display: none;">
      </div>

      <!-- Processing Workspace -->
      <div class="tool-workspace" id="workspace" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
        <!-- Left Column: Source Input -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.1rem; font-weight: 600; margin: 0;">Markdown Input</h3>
          <textarea id="data-input-preview" style="
            width: 100%;
            height: 350px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            padding: 16px;
            font-family: monospace;
            font-size: 0.9rem;
            resize: none;
          " placeholder="# Hello World&#10;&#10;This is a **bold** paragraph with a [link](https://toolhub.pro).&#10;&#10;- Item 1&#10;- Item 2"></textarea>
          
          <div style="display: flex; gap: 12px; margin-top: auto;">
            <button class="btn btn-primary" id="translate-btn" style="flex: 1;">Convert &rarr;</button>
            <button class="btn btn-secondary" id="reset-btn">Clear All</button>
          </div>
        </div>

        <!-- Right Column: HTML Output -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.1rem; font-weight: 600; margin: 0;">HTML Code Output</h3>
          <textarea id="data-output-preview" readonly style="
            width: 100%;
            height: 350px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            padding: 16px;
            font-family: monospace;
            font-size: 0.9rem;
            resize: none;
          " placeholder="HTML elements..."></textarea>
          
          <div style="display: flex; gap: 12px; margin-top: auto;">
            <button class="btn btn-primary" id="save-data-btn" style="flex: 1;">Download HTML</button>
            <button class="btn btn-secondary" onclick="navigator.clipboard.writeText(document.getElementById('data-output-preview').value).then(() => window.showToast('Copied to clipboard!', 'success'))" style="flex: 1;">Copy Results</button>
          </div>
        </div>
      </div>

      <!-- Dynamic Footer -->
      <footer id="global-footer"></footer>

    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="encoders-decoders.js"></script>
</body>
</html>
