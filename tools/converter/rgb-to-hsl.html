<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Tags -->
  <title>RGB to HSL Color Converter Online | RGB to HSL - ToolHub Pro</title>
  <meta name="title" content="RGB to HSL Color Converter Online | RGB to HSL - ToolHub Pro">
  <meta name="description" content="Translate Red, Green, and Blue (RGB) color channel values to Hue, Saturation, Lightness (HSL) coordinates online. Free, safe, client-side.">
  <link rel="canonical" href="https://toolhub.pro/tools/converter/rgb-to-hsl.html">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <!-- Collapsible Sidebar -->
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Header Navigation -->
    <header class="global-header" id="global-header"></header>

    <!-- Main Content Panel -->
    <main class="main-content">
      
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Converters</span> &gt; <span>RGB to HSL</span>
        </div>
        <h1 class="section-title">RGB to HSL Converter</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Translate RGB channels into cylindrical HSL coordinates. Instantly visualize and interact.</p>
      </div>

      <!-- Processing Workspace -->
      <div class="tool-workspace" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
        <!-- Left Column: RGB Inputs -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.1rem; font-weight: 600; margin: 0;">RGB Color Channels</h3>
          
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <div style="display: flex; align-items: center; gap: 16px;">
              <span style="width: 80px; font-weight: 600; color: #ff5e5e;">Red (R):</span>
              <input type="number" id="rgb-r" min="0" max="255" value="255" style="
                flex: 1;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                color: var(--text-primary);
                padding: 10px 14px;
                font-family: monospace;
              ">
            </div>

            <div style="display: flex; align-items: center; gap: 16px;">
              <span style="width: 80px; font-weight: 600; color: #5eff5e;">Green (G):</span>
              <input type="number" id="rgb-g" min="0" max="255" value="99" style="
                flex: 1;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                color: var(--text-primary);
                padding: 10px 14px;
                font-family: monospace;
              ">
            </div>

            <div style="display: flex; align-items: center; gap: 16px;">
              <span style="width: 80px; font-weight: 600; color: #5e5eff;">Blue (B):</span>
              <input type="number" id="rgb-b" min="0" max="255" value="71" style="
                flex: 1;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                color: var(--text-primary);
                padding: 10px 14px;
                font-family: monospace;
              ">
            </div>
          </div>

          <div style="display: flex; gap: 12px; margin-top: auto;">
            <button class="btn btn-primary" id="color-convert-btn" style="flex: 1;">Convert Color &rarr;</button>
          </div>
        </div>

        <!-- Right Column: Visual Preview & HSL outputs -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.1rem; font-weight: 600; margin: 0;">Color Preview & HSL Coordinates</h3>
          
          <!-- Interactive Color Preview & Picker -->
          <div style="display: flex; gap: 16px; align-items: center;">
            <div id="color-preview" style="
              width: 80px;
              height: 80px;
              border-radius: var(--radius-md);
              border: 2px solid var(--border-color);
              background-color: #FF6347;
              transition: background-color 0.2s ease;
            "></div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
              <label style="font-size: 0.9rem; color: var(--text-secondary);">Select visually:</label>
              <input type="color" id="color-picker-input" value="#FF6347" style="
                background: none;
                border: none;
                width: 60px;
                height: 40px;
                cursor: pointer;
              ">
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 12px;">
            <div style="display: flex; align-items: center; gap: 16px;">
              <span style="width: 120px; font-weight: 600; color: var(--text-secondary);">Hue (H):</span>
              <input type="text" id="output-h" readonly style="
                flex: 1;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                color: var(--text-primary);
                padding: 8px 12px;
                font-family: monospace;
              " placeholder="9">
              <span style="color: var(--text-secondary); width: 30px;">°</span>
            </div>

            <div style="display: flex; align-items: center; gap: 16px;">
              <span style="width: 120px; font-weight: 600; color: var(--text-secondary);">Saturation (S):</span>
              <input type="text" id="output-s" readonly style="
                flex: 1;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                color: var(--text-primary);
                padding: 8px 12px;
                font-family: monospace;
              " placeholder="100">
              <span style="color: var(--text-secondary); width: 30px;">%</span>
            </div>

            <div style="display: flex; align-items: center; gap: 16px;">
              <span style="width: 120px; font-weight: 600; color: var(--text-secondary);">Lightness (L):</span>
              <input type="text" id="output-l" readonly style="
                flex: 1;
                background: var(--bg-tertiary);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                color: var(--text-primary);
                padding: 8px 12px;
                font-family: monospace;
              " placeholder="64">
              <span style="color: var(--text-secondary); width: 30px;">%</span>
            </div>
          </div>

          <div style="display: flex; gap: 12px; margin-top: auto;">
            <button class="btn btn-secondary" onclick="navigator.clipboard.writeText(`hsl(${document.getElementById('output-h').value || '9'}, ${document.getElementById('output-s').value || '100'}%, ${document.getElementById('output-l').value || '64'}%)`).then(() => window.showToast('Copied HSL CSS color!', 'success'))" style="flex: 1;">Copy HSL CSS</button>
          </div>
        </div>
      </div>

      <!-- Dynamic Footer -->
      <footer id="global-footer"></footer>

    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="math-converters.js"></script>
</body>
</html>
