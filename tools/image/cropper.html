<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' blob: data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Tags -->
  <title>Image Cropper | Crop Images Online - ToolHub Pro</title>
  <meta name="title" content="Image Cropper | Crop Images Online - ToolHub Pro">
  <meta name="description" content="Crop images online with custom dimensions or standard aspect ratios (16:9, 1:1, 4:3). Rotate, flip, and crop JPG, PNG, WEBP securely.">
  <link rel="canonical" href="https://toolhub.pro/tools/image/cropper.html">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <div class="ambient-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-container">
    <!-- Collapsible Sidebar -->
    <aside class="global-sidebar" id="global-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Header Navigation -->
    <header class="global-header" id="global-header"></header>

    <!-- Main Content Panel -->
    <main class="main-content">
      
      <div class="tool-header">
        <div class="tool-breadcrumb">
          <a href="../../index.html">Home</a> &gt; <span>Image Tools</span> &gt; <span>Image Cropper</span>
        </div>
        <h1 class="section-title">Image Cropper</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Crop, rotate, and mirror your images. All processing is local and secure.</p>
      </div>

      <!-- Upload Zone -->
      <div class="upload-container glass-panel" id="upload-zone">
        <div class="upload-icon">️</div>
        <h3 class="upload-title">Drag & drop your image here</h3>
        <p class="upload-subtitle">Supports JPG, PNG, WEBP, SVG, GIF (Max 20MB)</p>
        <button class="btn btn-primary">Browse Files</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
      </div>

      <!-- Processing Workspace (Hidden Initially) -->
      <div class="tool-workspace" id="workspace" style="display: none;">
        <!-- Left Column: Cropper Workspace -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Crop Area</h3>
          
          <!-- Cropper Container -->
          <div style="background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 10px; height: 400px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
            <img id="cropper-image" style="max-width: 100%; max-height: 100%; display: block;" alt="Source image to crop">
          </div>
        </div>

        <!-- Right Column: Controls -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 24px;">
          <h3 style="font-family: var(--font-heading); font-size: 1.2rem; font-weight: 600;">Cropping Control</h3>

          <!-- Aspect Ratio Presets -->
          <div>
            <span style="display: block; margin-bottom: 10px; font-weight: 500; font-size: 0.95rem;">Aspect Ratio</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;" id="aspect-ratio-buttons">
              <button class="btn btn-secondary active" data-ratio="NaN" style="padding: 10px;">Free</button>
              <button class="btn btn-secondary" data-ratio="1" style="padding: 10px;">1:1 (Square)</button>
              <button class="btn btn-secondary" data-ratio="1.7777" style="padding: 10px;">16:9</button>
              <button class="btn btn-secondary" data-ratio="1.3333" style="padding: 10px;">4:3</button>
              <button class="btn btn-secondary" data-ratio="0.6666" style="padding: 10px;">2:3 (Portrait)</button>
            </div>
          </div>

          <!-- Transformations (Rotate / Flip) -->
          <div>
            <span style="display: block; margin-bottom: 10px; font-weight: 500; font-size: 0.95rem;">Transformations</span>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">
              <button class="btn btn-secondary" id="btn-rotate-left" title="Rotate Left 90°" style="padding: 10px; font-size: 1.1rem;">↺</button>
              <button class="btn btn-secondary" id="btn-rotate-right" title="Rotate Right 90°" style="padding: 10px; font-size: 1.1rem;">↻</button>
              <button class="btn btn-secondary" id="btn-flip-h" title="Flip Horizontal" style="padding: 10px; font-size: 1.1rem;">↔</button>
              <button class="btn btn-secondary" id="btn-flip-v" title="Flip Vertical" style="padding: 10px; font-size: 1.1rem;">↕</button>
            </div>
          </div>

          <!-- Format selector -->
          <div>
            <label for="format-select" style="display: block; margin-bottom: 8px; font-weight: 500;">Output Format</label>
            <select id="format-select" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-md); color: var(--text-primary); cursor: pointer;">
              <option value="original">Original Format</option>
              <option value="image/jpeg">JPEG</option>
              <option value="image/png">PNG</option>
              <option value="image/webp">WEBP</option>
            </select>
          </div>

          <!-- Action Buttons -->
          <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
            <button class="btn btn-primary" id="download-btn">
              Download Cropped Image
            </button>
            <button class="btn btn-secondary" id="reset-btn">
              Crop Another Image
            </button>
          </div>
        </div>
      </div>

      <!-- Dynamic Footer -->
      <footer id="global-footer"></footer>

    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="../../assets/js/app.js"></script>
  <script type="module" src="cropper.js"></script>
</body>
</html>
